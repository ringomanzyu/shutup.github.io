<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Shut up</title>
  <style>
    body {
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* フェードインアニメーション */
    .fadein {
      opacity: 0;
      animation: fadeIn 1.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 4rem;
      margin: 0 0 1rem;
    }

    a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 1.2rem;
      opacity: 0;
      animation: fadeIn 2.5s ease forwards;
      animation-delay: 0.5s;
    }
  </style>
</head>
<body>
  <h1 class="fadein">Shut up</h1>
  <a href="https://github.com/ringomanzyu" target="_blank" rel="noopener noreferrer">
    → GitHubプロフィールへ
  </a>
</body>
</html>
